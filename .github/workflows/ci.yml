name: studiographene-ci
on:
  workflow_call:
    inputs:
      # project_name is not used in the workflow, kept for backwards compatibility.
      project_name:
        type: string
        default: "sg-ci"
      excluded_jobs:
        type: string
        default: ""
      package_manager:
        type: string
        default: "npm"
      npm_token:
        type: string
        default: ""
      build_command:
        type: string
        default: "npm run build"
      docker_build_command:
        type: string
        default: "docker build -t local:latest ."
      lint_command:
        type: string
        default: "npm run lint"
      allowedLicenses:
        type: string
        default: "allowed_licenses.txt"
      semgrep_options:
        type: string
        default: ""
      danger_before_step_command:
        type: string
        default: ""
      danger_after_step_command:
        type: string
        default: ""
      semgrep_before_step_command:
        type: string
        default: ""
      semgrep_after_step_command:
        type: string
        default: ""
      sbom_before_step_command:
        type: string
        default: ""
      sbom_after_step_command:
        type: string
        default: ""
      osv_before_step_command:
        type: string
        default: ""
      osv_after_step_command:
        type: string
        default: ""
      licensescan_before_step_command:
        type: string
        default: ""
      licensescan_after_step_command:
        type: string
        default: ""
      gitleaks_before_step_command:
        type: string
        default: ""
      gitleaks_after_step_command:
        type: string
        default: ""
      pr_agent_before_step_command:
        type: string
        default: ""
      pr_agent_after_step_command:
        type: string
        default: ""
      caching_before_step_command:
        type: string
        default: ""
      caching_after_step_command:
        type: string
        default: ""
      docker_before_step_command:
        type: string
        default: ""
      docker_after_step_command:
        type: string
        default: ""
      lint_before_step_command:
        type: string
        default: ""
      lint_after_step_command:
        type: string
        default: ""
      build_before_step_command:
        type: string
        default: ""
      build_after_step_command:
        type: string
        default: ""
      PULSE_URL:
        type: string
        default: "https://a0lrn1xwl4.execute-api.eu-west-1.amazonaws.com"  
      dependencies_report_pulse_before_step_command:
        type: string
        default: ""
      dependencies_report_pulse_after_step_command:
        type: string
        default: ""
      sast_report_pulse_before_step_command:
        type: string
        default: ""
      sast_report_pulse_after_step_command:
        type: string
        default: ""
  

jobs:
  caching:
    name: Cache node modules
    runs-on: ubuntu-latest
    permissions: write-all
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.caching_before_step_command != '' }}
        run: |
          ${{ inputs.caching_before_step_command}}
      - name: Install dependencies
        run: |
          ${{ inputs.package_manager }} install
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Convert lockfile version > 2 in case of npm
        if: inputs.package_manager == 'npm'
        run: |
          ${{ inputs.package_manager }} install --lockfile-version 2 --package-lock-only
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache npm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'npm'
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.lock') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Cache yarn modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'yarn'
        with:
          path: /usr/local/share/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Cache pnpm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'pnpm'
        with:
          path: /__w/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Upload package-lock
        uses: actions/upload-artifact@v2
        if: inputs.package_manager == 'npm'
        with:
          name: lockFile
          path: package-lock.json
      - name: Upload yarn-lock
        uses: actions/upload-artifact@v2
        if: inputs.package_manager == 'yarn'
        with:
          name: lockFile
          path: yarn.lock
      - name: Upload pnpm-lock
        uses: actions/upload-artifact@v2
        if: inputs.package_manager == 'pnpm'
        with:
          name: lockFile
          path: pnpm-lock.yaml
      - name: after step
        if: ${{ inputs.caching_after_step_command != '' }}
        run: |
          ${{ inputs.caching_after_step_command}}

  sast:
    name: SAST Scan using semgrep
    if: ${{ !contains( inputs.excluded_jobs, 'sast' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.semgrep_before_step_command != '' }}
        run: |
          ${{ inputs.semgrep_before_step_command}}
      - name: SAST Scan
        id: generate_report
        run: |
          semgrep scan --config "p/default" --config /root/configs/semgrep/rules/eslint.v1.3.32.yml --sarif ${{ inputs.semgrep_options }} > semgrep.sarif

          csvData=$(node - << EOF
          const fs = require('fs');
          const sarifFile = fs.readFileSync("semgrep.sarif", 'utf8');
          const sarifData = JSON.parse(sarifFile);

          const tableData = [];

          for (const run of sarifData.runs) {
            for (const result of run.results) {
              let ruleId = result.ruleId.replaceAll(',',';');
              ruleId = ruleId.replaceAll('\n','');
              let message = result.message.text.replaceAll(',', ';');
              message = message.replaceAll('\n','');
              const severity = result.level;
              const location = result.locations[0].physicalLocation;
              const lineNumber = location.region.startLine;
              const fileName = location.artifactLocation.uri;
              // Add data to the tableData array
              tableData.push(ruleId + "|" + message +"|" + lineNumber + "|" + fileName);
            }
          }                  
          // Log the CSV data as a string
          const csvData = tableData.join('\n');
          console.log(csvData);
          EOF
          )

          # Append the CSV data to the output file
          echo 'report<<EOF' >> $GITHUB_OUTPUT
          echo "$csvData" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - uses: mshick/add-pr-comment@v2
        with:
          message-id: sast-scan
          message: "### Semgrep Report \n
            Below are the issues found by semgrep: \n
            \n\nRule Id | Message | Line Number | File Name \n
            --- | --- | --- | --- \n
            ${{steps.generate_report.outputs.report}}\n\n
            "
      - name: after step
        if: ${{ inputs.semgrep_after_step_command != '' }}
        run: |
          ${{ inputs.semgrep_after_step_command}}

  sbom:
    name: SBOM Generator using CycloneDX
    runs-on: ubuntu-latest
    permissions: write-all
    needs: caching
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.sbom_before_step_command != '' }}
        run: |
          ${{ inputs.sbom_before_step_command}}
      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: lockFile
          path: .
      - name: generate sbom
        run: |
          cdxgen --no-recurse -o bom.xml -p
        env:
          FETCH_LICENSE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CDXGEN_DEBUG_MODE: debug
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: sbom
          path: bom.xml
      - name: after step
        if: ${{ inputs.sbom_after_step_command != '' }}
        run: |
          ${{ inputs.sbom_after_step_command}}

  dependency_scan:
    name: Dependency Scan using Google OSV
    needs: sbom
    if: ${{ !contains( inputs.excluded_jobs, 'dependency_scan' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: sbom
          path: .
      - name: before step
        if: ${{ inputs.osv_before_step_command != '' }}
        run: |
          ${{ inputs.osv_before_step_command}}
      - name: OSV Scan
        run: |
          osv-scanner --format table --config=/root/configs/osv/config.toml --sbom=bom.xml
      - name: after step
        if: ${{ inputs.osv_after_step_command != '' }}
        run: |
          ${{ inputs.osv_after_step_command}}

  licenseScan:
    name: Executing a licenseScan using studiographene-cli
    needs: sbom
    if: ${{ !contains( inputs.excluded_jobs, 'licenseScan' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.number }}
      PROJECT_NAME: ${{ github.event.repository.name }}
      PROJECT_OWNER: ${{ github.repository_owner }}
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.licensescan_before_step_command != '' }}
        run: |
          ${{ inputs.licensescan_before_step_command}}
      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: sbom
          path: .
      - name: License Scan
        run: |
          /root/executables/ci-utility check --sbom bom.xml --allowedLicences ${{ inputs.allowedLicenses }}
      - name: after step
        if: ${{ inputs.licensescan_after_step_command != '' }}
        run: |
          ${{ inputs.licensescan_after_step_command}}

  gitleaks:
    name: Gitleaks scan to find secrets
    if: ${{ !contains( inputs.excluded_jobs, 'gitleaks' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: before step
        if: ${{ inputs.gitleaks_before_step_command != '' }}
        run: |
          ${{ inputs.gitleaks_before_step_command}}
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: after step
        if: ${{ inputs.gitleaks_after_step_command != '' }}
        run: |
          ${{ inputs.gitleaks_after_step_command }}

  lint:
    name: eslint scan to find linting issues
    if: ${{ !contains( inputs.excluded_jobs, 'lint' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    needs: caching
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.lint_before_step_command != '' }}
        run: |
          ${{ inputs.lint_before_step_command}}
      - name: Cache npm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'npm'
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.lock') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Cache yarn modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'yarn'
        with:
          path: /usr/local/share/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Cache pnpm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'pnpm'
        with:
          path: /__w/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: |
          ${{ inputs.package_manager }} install
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Eslint scan
        run: |
          ${{ inputs.lint_command }}
      - name: after step
        if: ${{ inputs.lint_after_step_command != '' }}
        run: |
          ${{ inputs.lint_after_step_command }}

  build:
    name: project build check
    if: ${{ !contains( inputs.excluded_jobs, 'build' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    needs: caching
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.build_before_step_command != '' }}
        run: |
          ${{ inputs.build_before_step_command}}
      - name: Cache npm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'npm'
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.lock') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Cache yarn modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'yarn'
        with:
          path: /usr/local/share/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Cache pnpm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'pnpm'
        with:
          path: /__w/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: |
          ${{ inputs.package_manager }} install
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build project
        run: |
          ${{ inputs.build_command }}
      - name: after step
        if: ${{ inputs.build_after_step_command != '' }}
        run: |
          ${{ inputs.build_after_step_command }}

  docker:
    name: Docker build check
    if: ${{ !contains( inputs.excluded_jobs, 'docker' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.docker_before_step_command != '' }}
        run: |
          ${{ inputs.docker_before_step_command }}
      - name: Docker Build project
        run: |
          ${{ inputs.docker_build_command }}
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: after step
        if: ${{ inputs.docker_after_step_command != '' }}
        run: |
          ${{ inputs.docker_after_step_command }}

  danger:
    name: run danger check
    if: ${{ !contains( inputs.excluded_jobs, 'danger' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions: write-all
    needs: caching
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.REF }}
      - name: before step
        if: ${{ inputs.danger_before_step_command != '' }}
        run: |
          ${{ inputs.danger_before_step_command}}
      - name: Cache npm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'npm'
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.lock') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Cache yarn modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'yarn'
        with:
          path: /usr/local/share/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Cache pnpm modules
        uses: actions/cache@v3
        if: inputs.package_manager == 'pnpm'
        with:
          path: /__w/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: |
          ${{ inputs.package_manager }} install
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: danger check
        run: |
          cp /root/configs/dangerfile.ts dangerfile.ts
          danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: after step
        if: ${{ inputs.danger_after_step_command != '' }}
        run: |
          ${{ inputs.danger_after_step_command}}

  pr_agent:
    name: Run pr agent on every pull request, respond to user comments
    if: ${{ !contains( inputs.excluded_jobs, 'pr_agent' ) && (github.actor != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: before step
        if: ${{ inputs.pr_agent_before_step_command != '' }}
        run: |
          ${{ inputs.pr_agent_before_step_command}}
      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: after step
        if: ${{ inputs.pr_agent_after_step_command != '' }}
        run: |
          ${{ inputs.pr_agent_after_step_command}}

 
  sast_report_pulse:
    name: SAST report feed to Pulse
    runs-on: ubuntu-latest
    if:  
      github.event_name == 'push' &&
      github.ref == 'refs/heads/default' &&
      github.event_name != 'pull_request' &&
      contains(github.event.head_commit.id, github.event.before) &&
      contains('protected', join(',', github.event.repository.branches[github.ref_type].protection_rules[0].contexts))  
    container:
      image: public.ecr.aws/studiographene/ci:node-20-alpine
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
      - name: before step
        if: ${{ inputs.sast_report_pulse_before_step_command != '' }}
        run: |
          ${{ inputs.sast_report_pulse_before_step_command}}
      - name: SAST Scan
        id: generate_report
        run: |
          semgrep --config "p/default" --config /root/configs/semgrep/rules/eslint.yml --sarif ${{ inputs.semgrep_options }} | tee semgrep.sarif
      - name: Display Errors
        id: display_errors
        run: |
          jq -n '[inputs | .runs[].results[] | {ruleId: .ruleId, message: .message.text, location: .locations[].physicalLocation.artifactLocation.uri, lineNo: .locations[].physicalLocation.region.startLine, snippet: .locations[].physicalLocation.region.snippet.text}]' semgrep.sarif > temp_errors.json
          date=$(date +%Y-%m-%d)
          branch=${GITHUB_REF_NAME}
          repo=${{ github.repository }}
          orgId=${{ github.event.organization.id }}
          repoId=${{ github.repository_id }}
          data=$(jq -n --arg date "$date" --arg branch "$branch" --arg orgId "$orgId" --arg repoId "$repoId" --arg repo "$repo" '{date: $date, branch: $branch, repo: $repo, orgId: $orgId, repoId: $repoId, errors: input}' temp_errors.json)
          # Write the data to a JSON file
          echo "No. of error findings: $data"
          echo "$data" > sast_errors.json
          url="${{ inputs.PULSE_URL }}/github/repo-sast-errors"
          content_type="application/json"  # Set your content type

          # Send the request
          curl -X POST \
                  -H "Content-Type: $content_type" \
                  --data-binary "@sast_errors.json" \
                  "$url"

      - name: after step
        if: ${{ inputs.sast_report_pulse_after_step_command != '' }}
        run: |
          ${{ inputs.sast_report_pulse_after_step_command}}



  read_dependencies:
    runs-on: ubuntu-latest
    if:
      github.event_name == 'push' &&
      github.ref == 'refs/heads/default' &&
      github.event_name != 'pull_request' &&
      contains(github.event.head_commit.id, github.event.before) &&
      contains('protected', join(',', github.event.repository.branches[github.ref_type].protection_rules[0].contexts))
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install jq and curl
        run: sudo apt-get install -y jq curl

      - name: before step
        if: ${{ inputs.dependencies_report_pulse_before_step_command != '' }}
        run: |
          ${{ inputs.dependencies_report_pulse_before_step_command}}

      - name: Read dependencies
        run: |
          #!/bin/bash

          all_deps='{}'
          engines_total='{}'
          internal_packages='[]'

          while read -r file; do
              name=$(jq -r '.name' "$file")
              deps=$(jq '.dependencies + .devDependencies' "$file")
              engines=$(jq '.engines' "$file")

              if [ "$deps" != "null" ]; then
                  all_deps=$(jq -s add <(echo "$all_deps") <(echo "$deps"))
              fi
              if [ "$engines" != "null" ]; then
                  engines_total=$(jq -s add <(echo "$engines_total") <(echo "$engines"))
              fi

              internal_packages=$(jq --arg name "$name" '. + [$name]' <<< "$internal_packages")
          done < <(find . -name 'package.json')

          # Extract the names of the dependencies
          dep_names=$(echo "$all_deps" | jq -r 'keys[]')

          # Initialize an empty JSON object
          dep_info='{}'
          dependencies_array='[]'
          core_dependencies_array='[]'

          # Get the version, repository URL, owner, and repo name for each dependency
          for dep in $dep_names; do
          version=$(echo "$all_deps" | jq -r ".[\"$dep\"]" | sed 's/^~\|^>=\|^<=\|^>\|^<\|^=\|^*//')
          repo_url=""

          set -e

          if npm view "$dep" repository.url --json 2>/dev/null | grep -q "http"; then
          repo_url=$(npm view "$dep" repository.url --json 2>/dev/null) || {
            echo "Failed to get repository URL for $dep"
          }
          fi

          if [[ $repo_url == http* || $repo_url == git+http* ]]; then
          repo_url=${repo_url#*://github.com/}
          repo_url=${repo_url%.git}
          IFS='/' read -r owner repo_name <<< "$repo_url"
          else
            owner=null
            repo_name=null
          fi
          # Skip dependencies that start with "workspace:"
          if [[ "$version" == workspace:* ]]; then
            continue
          fi

          # Remove the "^" character from the version string and remove any spaces
          version=$(echo "$version" | sed 's/\^//; s/ //g')
          if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
          dependencies_array=$(echo "$dependencies_array" | jq ". += [{\"dependencyName\": \"$dep\", \"currentVersion\": \"$version\"}]")
          else
            echo "Invalid version format for dependency $dep: $version"
            # Your code when the version does not match the regex
            continue  # Skip to the next iteration of the loop
          fi
          done

          # Convert the engines_total object into an array of objects with dependencyName and currentVersion fields
          core_dep_names=$(echo "$engines_total" | jq -r 'keys[]')

          for core_dep in $core_dep_names; do
          # Remove the ">=" characters from core_version
          core_version=$(echo "$engines_total" | jq -r ".[\"$core_dep\"]" | sed 's/^~\|^>=\|^<=\|^>\|^<\|^=\|^*\|\^//')
          core_dependencies_array=$(echo "$core_dependencies_array" | jq ". += [{\"dependencyName\": \"$core_dep\", \"currentVersion\": \"$core_version\"}]")
          done

          # Remove objects from dependencies_array that have the same name as internal_packages array values
          dependencies_array=$(jq --argjson internal_packages "$internal_packages" 'map(select(.dependencyName | IN($internal_packages[]) | not))' <<< "$dependencies_array")


          nested_info="{\"coreDependencies\": $core_dependencies_array, \"repositoryInfo\": {\"repoName\": \"${{ github.repository }}\", \"repoId\": \"${{ github.repository_id }}\", \"repoOwner\": \"${{ github.repository_owner }}\"}, \"dependencies\": $dependencies_array}"
          echo "Dependencies information:"
          echo "$nested_info"

          # Make a POST request with all the JSON object information as the body
          curl -X POST -H "Content-Type: application/json" -d "$nested_info" "${{ inputs.PULSE_URL }}/github/repo-libraries"

      - name: after step
        if: ${{ inputs.dependencies_report_pulse_after_step_command != '' }}
        run: |
          ${{ inputs.dependencies_report_pulse_after_step_command}}

          